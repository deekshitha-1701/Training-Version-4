<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add.html">Add Student</a>
        <a href="view.html">View Student</a>
        <a href="logout.html">Logout</a>
    </nav>

    <h1>Edit Student Details</h1>

    <form onsubmit="return updateStudent(event)">

        <br><br>

        <input type="text" id="name" placeholder="Name" required><br><br>

        <input type="text" id="age" placeholder="Age" required><br><br>

        <input type="email" id="email" placeholder="Email" required><br><br>

        <input type="number" id="cgpa" placeholder="CGPA" step="0.01" required><br><br>

        <button type="submit">Update</button>

    </form>

    <script>

        // Get student index from URL
        let index = localStorage.getItem("editIndex");

        let students = JSON.parse(localStorage.getItem("students")) || [];

        let student = students[index];

        // Fill form with existing student data
        document.getElementById("name").value = student.name;
        document.getElementById("age").value = student.age;
        document.getElementById("email").value = student.email;
        document.getElementById("cgpa").value = student.cgpa;

    </script>

</body>
</html>
